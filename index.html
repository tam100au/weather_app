<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WEATHERLY</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <div>
        <p class="eyebrow">WEATHERLY</p>
        <h1>Current weather for any city</h1>
        <p class="lead">Enter a city and country code to view temperature, conditions, humidity, and wind speed.</p>
      </div>
      <form id="weather-form" class="weather-form" novalidate>
        <div class="field-group">
          <label for="city">City</label>
          <input id="city" name="city" type="text" placeholder="Sydney" required>
        </div>
        <div class="field-group">
          <label for="country">Country</label>
          <input id="country" name="country" type="text" placeholder="AU" required>
        </div>
        <div class="field-group">
          <label for="api-key">OpenWeatherMap API Key</label>
          <input id="api-key" name="api-key" type="password" placeholder="Enter your API key" required>
        </div>
        <button type="submit">Get Weather</button>
        <p id="feedback" class="feedback" aria-live="polite"></p>
      </form>
    </section>

    <section id="result" class="result-card hidden" aria-live="polite">
      <div class="result-header">
        <div>
          <p class="location" id="location-name"></p>
          <p class="condition" id="weather-condition"></p>
        </div>
        <img id="weather-icon" src="" alt="Weather icon" class="weather-icon hidden">
      </div>
      <div class="weather-metrics">
        <div class="metric">
          <span class="metric-label">Temperature</span>
          <strong id="temperature"></strong>
        </div>
        <div class="metric">
          <span class="metric-label">Humidity</span>
          <strong id="humidity"></strong>
        </div>
        <div class="metric">
          <span class="metric-label">Wind</span>
          <strong id="wind-speed"></strong>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
